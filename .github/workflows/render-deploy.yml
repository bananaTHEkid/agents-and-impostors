name: Render Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK secret is missing" >&2
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK"

      - name: Create GitHub deployment
        id: create_deployment
        uses: peter-evans/create-deployment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.sha }}
          environment: production
          auto_inactive: true

      - name: Mark deployment in_progress
        uses: peter-evans/create-deployment-status@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deployment_id: ${{ steps.create_deployment.outputs.deployment_id }}
          state: in_progress
          environment_url: https://triple-2-0.onrender.com

      - name: Mark deployment success
        if: success()
        uses: peter-evans/create-deployment-status@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deployment_id: ${{ steps.create_deployment.outputs.deployment_id }}
          state: success
          environment_url: https://triple-2-0.onrender.com
          log_url: https://dashboard.render.com/web

      - name: Mark deployment failure
        if: failure()
        uses: peter-evans/create-deployment-status@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deployment_id: ${{ steps.create_deployment.outputs.deployment_id }}
          state: failure
          environment_url: https://triple-2-0.onrender.com
          log_url: https://dashboard.render.com/web
