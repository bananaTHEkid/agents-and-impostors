services:
  server:
    image: ghcr.io/bananathekid/agents-and-impostors-server:latest
    ports:
      - "5001:5001"
    environment:
      CLIENT_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      # JWT_SECRET: set-me

  client:
    image: ghcr.io/bananathekid/agents-and-impostors-client:latest
    ports:
      - "3000:80"
    depends_on:
      - server